services:
  - type: web
    name: stadium-ops-backend
    env: python
    region: ohio
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: MATCH_START_UTC
        sync: false
      - key: DEMO_PASSWORD
        sync: false
      - key: ENV
        value: "production"
